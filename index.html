document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n          <a href=\"#community\">Community<\u002Fa>\n          <a href=\"#faq\">FAQ<\u002Fa>\n        <\u002Fspan>\n        <span class=\"fm-lang\" style=\"display:inline-flex;align-items:center;border:1.5px solid #A8E6F1;border-radius:999px;overflow:hidden;font:700 13px 'Quicksand';line-height:1;margin-right:4px;\"><a href=\"#top\" aria-current=\"page\" style=\"padding:7px 13px;color:#0D3D47;background:#A8E6F1;text-decoration:none;\">EN<\u002Fa><a href=\"fr/index.html\" aria-current=\"false\" style=\"padding:7px 13px;color:#0D3D47;background:transparent;text-decoration:none;\">FR<\u002Fa><\u002Fspan><a href=\"https://tally.so/r/ODlBM7\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"background:#E8450A;color:#fff;border-radius:999px;padding:10px 22px;white-space:nowrap;\">Join the waiting list<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== HERO ===== -->\n  <section id=\"top\" style=\"background:#A8E6F1;\">\n    <div class=\"fm-hero fm-wrap\" style=\"max-width:1180px;margin:0 auto;padding:64px 40px;display:grid;grid-template-columns:1fr auto;gap:48px;align-items:center;\">\n      <div>\n        <div style=\"font:700 14px 'Quicksand';color:#E8450A;letter-spacing:.16em;text-transform:uppercase;margin-bottom:18px;\">Free app · iOS &amp; Android · Launching September 2026<\u002Fdiv>\n        <h1 style=\"margin:0;font:700 56px/1.04 'Fredoka',sans-serif;color:#0D3D47;\">Meet surfers. Log waves. Surf better.<\u002Fh1>\n        <p style=\"margin:22px 0 30px;font:500 19px/1.6 'Quicksand';color:#3c5860;max-width:460px;\">Foamies is the free surf app for every surfer. Meet surfers near you, log every session, and find the local surf pros (surfcamps, shapers, photographers and coaches). A warm community that makes surfing somewhere new feel like surfing with friends.<\u002Fp>\n        <div style=\"display:flex;gap:13px;flex-wrap:wrap;\">\n          <a href=\"https://tally.so/r/ODlBM7\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"background:#E8450A;color:#fff;border-radius:999px;padding:15px 30px;font:600 16px 'Quicksand';\">Join the waiting list<\u002Fa>\n          <a href=\"#how\" style=\"background:#fff;color:#0D3D47;border:1.5px solid #d9dedc;border-radius:999px;padding:15px 30px;font:600 16px 'Quicksand';\">See how it works<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"margin-top:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;font:600 13px 'Quicksand';color:#7a8a8e;\">\n          <span>● For every surfer<\u002Fspan><span>● No experience needed<\u002Fspan><span>● Free to join<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;\">\n        <div style=\"animation:foamFloat 6s ease-in-out infinite;\" class=\"fm-phone-wrap\"><div class=\"fm-phone\" style=\"width:300px;background:#0d0f12;border-radius:46px;padding:10px;box-shadow:0 34px 60px -22px rgba(13,61,71,.5);\">\n          <img src=\"assets/hero.png\" alt=\"The Foamies surf app showing surf buddies nearby and surf spots around you\" style=\"display:block;width:100%;height:auto;border-radius:37px;\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fsection>\n\n  <!-- ===== FEATURES (numbered) ===== -->\n  <section id=\"features\" style=\"background:#fff;\">\n    <div class=\"fm-wrap\" style=\"max-width:1180px;margin:0 auto;padding:80px 40px;\">\n      <div style=\"text-align:center;font:700 14px 'Quicksand';color:#E8450A;letter-spacing:.16em;text-transform:uppercase;margin-bottom:14px;\">What you can do<\u002Fdiv>\n      <h2 style=\"margin:0 0 8px;font:700 40px 'Fredoka',sans-serif;color:#0D3D47;text-align:center;\">One app, your whole surf life<\u002Fh2>\n      <p style=\"margin:0 auto 48px;font:500 18px 'Quicksand';color:#5a7077;max-width:560px;text-align:center;\">Four things Foamies does, built so surfing somewhere new feels like surfing with friends.<\u002Fp>\n      <div class=\"fm-feat\" style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:18px;\">\n        <div style=\"border:1px solid #ececec;border-radius:20px;padding:30px;\"><div style=\"font:700 34px 'Fredoka',sans-serif;color:#E8450A;margin-bottom:14px;\">01<\u002Fdiv><div style=\"font:700 21px 'Quicksand';color:#0D3D47;\">Find surf buddies near you<\u002Fdiv><p style=\"margin:8px 0 0;font:500 15px/1.55 'Quicksand';color:#5a7077;\">See who's surfing around you and link up, so you never paddle out alone in a new spot. Meet surfers by spot and level.<\u002Fp><div style=\"margin-top:22px;display:flex;justify-content:center;\"><div style=\"width:100%;max-width:280px;background:#0d0f12;border-radius:46px;padding:10px;box-shadow:0 34px 60px -22px rgba(13,61,71,.5);\"><img src=\"assets/findbuddies.png\" alt=\"Finding surf buddies near you on the Foamies app\" style=\"display:block;width:100%;height:auto;border-radius:37px;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid #ececec;border-radius:20px;padding:30px;\"><div style=\"font:700 34px 'Fredoka',sans-serif;color:#E8450A;margin-bottom:14px;\">02<\u002Fdiv><div style=\"font:700 21px 'Quicksand';color:#0D3D47;\">Log &amp; share your sessions<\u002Fdiv><p style=\"margin:8px 0 0;font:500 15px/1.55 'Quicksand';color:#5a7077;\">Save every wave you ride — spot, conditions and how it felt. Build your surf logbook and watch your progress over time.<\u002Fp><div style=\"margin-top:22px;display:flex;justify-content:center;\"><div style=\"width:100%;max-width:280px;background:#0d0f12;border-radius:46px;padding:10px;box-shadow:0 34px 60px -22px rgba(13,61,71,.5);\"><img src=\"assets/logandshare.png\" alt=\"Logging a surf session in the Foamies surf logbook\" style=\"display:block;width:100%;height:auto;border-radius:37px;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid #ececec;border-radius:20px;padding:30px;\"><div style=\"font:700 34px 'Fredoka',sans-serif;color:#E8450A;margin-bottom:14px;\">03<\u002Fdiv><div style=\"font:700 21px 'Quicksand';color:#0D3D47;\">Explore surf spots around you<\u002Fdiv><p style=\"margin:8px 0 0;font:500 15px/1.55 'Quicksand';color:#5a7077;\">Discover the best surf spots near you and wherever you travel. Save your favourites and never wonder where to paddle out again.<\u002Fp><div style=\"margin-top:22px;display:flex;justify-content:center;\"><div style=\"width:100%;max-width:280px;background:#0d0f12;border-radius:46px;padding:10px;box-shadow:0 34px 60px -22px rgba(13,61,71,.5);\"><img src=\"assets/spots.png\" alt=\"Exploring surf spots around you on the Foamies map\" style=\"display:block;width:100%;height:auto;border-radius:37px;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid #ececec;border-radius:20px;padding:30px;\"><div style=\"font:700 34px 'Fredoka',sans-serif;color:#E8450A;margin-bottom:14px;\">04<\u002Fdiv><div style=\"font:700 21px 'Quicksand';color:#0D3D47;\">Find local surf pros<\u002Fdiv><p style=\"margin:8px 0 0;font:500 15px/1.55 'Quicksand';color:#5a7077;\">Surfcamps, shapers, photographers, coaches and more — all listed near you. Discover trusted local surf pros wherever you go.<\u002Fp><div style=\"margin-top:22px;display:flex;justify-content:center;\"><div style=\"width:100%;max-width:280px;background:#0d0f12;border-radius:46px;padding:10px;box-shadow:0 34px 60px -22px rgba(13,61,71,.5);\"><img src=\"assets/findlocal.png\" alt=\"Finding local surf pros and surfcamps on Foamies\" style=\"display:block;width:100%;height:auto;border-radius:37px;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== WAITING LIST ===== -->\n  <section id=\"beta\" style=\"background:#0D3D47;color:#fff;\">\n    <div class=\"fm-2col fm-wrap\" style=\"max-width:1180px;margin:0 auto;padding:80px 40px;display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;\">\n      <div>\n        <div style=\"font:700 14px 'Quicksand';color:#E8450A;letter-spacing:.16em;text-transform:uppercase;margin-bottom:14px;\">Early access<\u002Fdiv>\n        <h2 style=\"margin:0;font:700 40px 'Fredoka',sans-serif;color:#fff;\">Get the app before everyone else<\u002Fh2>\n        <p style=\"margin:18px 0 26px;font:500 18px/1.6 'Quicksand';color:#bfe0e6;max-width:440px;\">Foamies is built by Théa and Lorène, in the open. Join the list to get the app first and help shape what it becomes. Closed testing spots are limited — the earlier you join, the sooner you surf with us.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:14px;\">\n          <div style=\"display:flex;align-items:flex-start;gap:12px;\"><span style=\"width:24px;height:24px;border-radius:50%;background:#E8450A;color:#fff;display:flex;align-items:center;justify-content:center;font:700 13px 'Quicksand';flex:none;\">1<\u002Fspan><div style=\"font:600 16px 'Quicksand';color:#fff;\">First in line when closed testing opens in August<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-start;gap:12px;\"><span style=\"width:24px;height:24px;border-radius:50%;background:#E8450A;color:#fff;display:flex;align-items:center;justify-content:center;font:700 13px 'Quicksand';flex:none;\">2<\u002Fspan><div style=\"font:600 16px 'Quicksand';color:#fff;\">A real say in what we build next<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-start;gap:12px;\"><span style=\"width:24px;height:24px;border-radius:50%;background:#E8450A;color:#fff;display:flex;align-items:center;justify-content:center;font:700 13px 'Quicksand';flex:none;\">3<\u002Fspan><div style=\"font:600 16px 'Quicksand';color:#fff;\">Founder access — talk to Théa &amp; Lorène directly<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-start;gap:12px;\"><span style=\"width:24px;height:24px;border-radius:50%;background:#E8450A;color:#fff;display:flex;align-items:center;justify-content:center;font:700 13px 'Quicksand';flex:none;\">4<\u002Fspan><div style=\"font:600 16px 'Quicksand';color:#fff;\">Founding-member status when we launch<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:24px;font:500 14px 'Quicksand';color:#9fc4cc;\">Waiting list now (July) → closed testing in August → public launch in September.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:24px;padding:34px;color:#0D3D47;\">\n        <sc-if value=\"{{ betaOpen }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <div style=\"font:700 20px 'Quicksand';color:#0D3D47;margin-bottom:4px;\">Join the waiting list<\u002Fdiv>\n            <div style=\"font:500 14px 'Quicksand';color:#6b7882;margin-bottom:20px;\">When closed testing opens in August we'll invite you through TestFlight or Google Play, so tell us your phone.<\u002Fdiv>\n            <label style=\"display:block;font:600 13px 'Quicksand';color:#0D3D47;margin-bottom:7px;\">Your phone (iPhone / Android)<\u002Flabel>\n            <div style=\"display:flex;gap:10px;margin-bottom:18px;\">\n              <div onclick=\"{{ setIos }}\" style=\"{{ iosStyle }}\">📱 iPhone (iOS)<\u002Fdiv>\n              <div onclick=\"{{ setAndroid }}\" style=\"{{ androidStyle }}\">🤖 Android<\u002Fdiv>\n            <\u002Fdiv>\n            <label style=\"display:block;font:600 13px 'Quicksand';color:#0D3D47;margin-bottom:7px;\">Email<\u002Flabel>\n            <input type=\"email\" placeholder=\"you@email.com\" style=\"width:100%;border:1.5px solid #d9dedc;border-radius:12px;padding:13px 15px;font:500 15px 'Quicksand';color:#0D3D47;margin-bottom:18px;outline:none;\">\n            <button onclick=\"{{ submitBeta }}\" style=\"width:100%;background:#E8450A;color:#fff;border:none;border-radius:12px;padding:15px;font:700 16px 'Quicksand';cursor:pointer;\">Join the waiting list<\u002Fbutton>\n            <div style=\"margin-top:13px;font:500 12px 'Quicksand';color:#9aa6a9;text-align:center;\">No spam. We'll only email you about Foamies.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ betaDone }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;padding:18px 0;\">\n            <div style=\"width:60px;height:60px;border-radius:50%;background:#A8E6F1;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:28px;\">🤙<\u002Fdiv>\n            <div style=\"font:700 26px 'Fredoka',sans-serif;color:#0D3D47;margin-bottom:8px;\">You're on the list!<\u002Fdiv>\n            <p style=\"margin:0;font:500 15px/1.6 'Quicksand';color:#5a7077;\">We'll be in touch when closed testing opens in August. Come say hi on Instagram <strong style=\"color:#E8450A;\">@foamiesclub<\u002Fstrong> in the meantime.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== ROADMAP ===== -->\n  <section id=\"how\" style=\"background:#fff;\">\n    <div class=\"fm-wrap\" style=\"max-width:1180px;margin:0 auto;padding:80px 40px;\">\n      <div style=\"text-align:center;font:700 14px 'Quicksand';color:#E8450A;letter-spacing:.16em;text-transform:uppercase;margin-bottom:14px;\">The plan<\u002Fdiv>\n      <h2 style=\"margin:0 0 36px;font:700 36px 'Fredoka',sans-serif;color:#0D3D47;text-align:center;\">On the way to September<\u002Fh2>\n      <div class=\"fm-roadmap\" style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;\">\n        <div style=\"background:#A8E6F1;border-radius:20px;padding:28px;\"><div style=\"font:700 14px 'Quicksand';color:#0D3D47;opacity:.7;\">Now · July<\u002Fdiv><div style=\"font:700 22px 'Quicksand';color:#0D3D47;margin:4px 0 8px;\">Waiting list<\u002Fdiv><p style=\"margin:0;font:500 15px/1.55 'Quicksand';color:#205962;\">Join the list and we'll keep you posted as we get ready for testing. The earlier you join, the sooner you're in.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#FBEBCF;border-radius:20px;padding:28px;\"><div style=\"font:700 14px 'Quicksand';color:#8A4B00;opacity:.8;\">August 2026<\u002Fdiv><div style=\"font:700 22px 'Quicksand';color:#0D3D47;margin:4px 0 8px;\">Closed testing<\u002Fdiv><p style=\"margin:0;font:500 15px/1.55 'Quicksand';color:#7a5a2a;\">A first, limited group of testers gets the app early and helps us shape it. Spots are limited.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#E8450A;border-radius:20px;padding:28px;\"><div style=\"font:700 14px 'Quicksand';color:#fff;opacity:.85;\">September 2026<\u002Fdiv><div style=\"font:700 22px 'Quicksand';color:#fff;margin:4px 0 8px;\">Public launch<\u002Fdiv><p style=\"margin:0;font:500 15px/1.55 'Quicksand';color:rgba(255,255,255,.92);\">Foamies opens to surfers everywhere, on iOS and Android.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOR SURF PROS ===== -->\n  <section id=\"pros\" style=\"background:#A8E6F1;\">\n    <div class=\"fm-2col fm-wrap\" style=\"max-width:1180px;margin:0 auto;padding:80px 40px;display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;\">\n      <div>\n        <div style=\"font:700 14px 'Quicksand';color:#E8450A;letter-spacing:.16em;text-transform:uppercase;margin-bottom:14px;\">For surf pros<\u002Fdiv>\n        <h2 style=\"margin:0;font:700 38px 'Fredoka',sans-serif;color:#0D3D47;\">Run a surfcamp, shape boards, or shoot the lineup?<\u002Fh2>\n        <p style=\"margin:18px 0 18px;font:500 18px/1.6 'Quicksand';color:#5a7077;max-width:460px;\">Foamies has a directory of local surf pros — surfcamps, shapers, photographers, coaches, shops and more. Get listed before we launch and be there from day one, in front of every surfer who joins.<\u002Fp>\n        <p style=\"margin:0 0 24px;font:700 16px/1.5 'Quicksand';color:#E8450A;max-width:460px;\">Founding pros get a featured spot on the map — free.<\u002Fp>\n        <div style=\"display:flex;gap:9px;flex-wrap:wrap;\">\n          <span style=\"background:#fff;color:#0D3D47;border:1px solid #e4ddcd;border-radius:999px;padding:7px 14px;font:600 13px 'Quicksand';\">Surfcamps<\u002Fspan>\n          <span style=\"background:#fff;color:#0D3D47;border:1px solid #e4ddcd;border-radius:999px;padding:7px 14px;font:600 13px 'Quicksand';\">Coaches<\u002Fspan>\n          <span style=\"background:#fff;color:#0D3D47;border:1px solid #e4ddcd;border-radius:999px;padding:7px 14px;font:600 13px 'Quicksand';\">Shapers<\u002Fspan>\n          <span style=\"background:#fff;color:#0D3D47;border:1px solid #e4ddcd;border-radius:999px;padding:7px 14px;font:600 13px 'Quicksand';\">Photographers<\u002Fspan>\n          <span style=\"background:#fff;color:#0D3D47;border:1px solid #e4ddcd;border-radius:999px;padding:7px 14px;font:600 13px 'Quicksand';\">Surf shops<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:24px;padding:34px;box-shadow:0 20px 44px -24px rgba(13,61,71,.35);\">\n        <sc-if value=\"{{ proOpen }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <div style=\"font:700 20px 'Quicksand';color:#0D3D47;margin-bottom:4px;\">Get listed on Foamies<\u002Fdiv>\n            <div style=\"font:500 14px 'Quicksand';color:#6b7882;margin-bottom:20px;\">Tell us about your business and we'll be in touch before launch.<\u002Fdiv>\n            <label style=\"display:block;font:600 13px 'Quicksand';color:#0D3D47;margin-bottom:7px;\">Business name<\u002Flabel>\n            <input type=\"text\" placeholder=\"e.g. Lineup Surfcamp\" style=\"width:100%;border:1.5px solid #d9dedc;border-radius:12px;padding:13px 15px;font:500 15px 'Quicksand';color:#0D3D47;margin-bottom:16px;outline:none;\">\n            <label style=\"display:block;font:600 13px 'Quicksand';color:#0D3D47;margin-bottom:7px;\">What you do<\u002Flabel>\n            <select style=\"width:100%;border:1.5px solid #d9dedc;border-radius:12px;padding:13px 15px;font:500 15px 'Quicksand';color:#0D3D47;margin-bottom:16px;outline:none;background:#fff;\"><option>Surfcamp<\u002Foption><option>Surf school / coaching<\u002Foption><option>Board shaper<\u002Foption><option>Photographer / videographer<\u002Foption><option>Surf shop<\u002Foption><option>Café / food<\u002Foption><option>Event organiser<\u002Foption><\u002Fselect>\n            <label style=\"display:block;font:600 13px 'Quicksand';color:#0D3D47;margin-bottom:7px;\">Email<\u002Flabel>\n            <input type=\"email\" placeholder=\"you@business.com\" style=\"width:100%;border:1.5px solid #d9dedc;border-radius:12px;padding:13px 15px;font:500 15px 'Quicksand';color:#0D3D47;margin-bottom:18px;outline:none;\">\n            <button onclick=\"{{ submitPro }}\" style=\"width:100%;background:#0D3D47;color:#fff;border:none;border-radius:12px;padding:15px;font:700 16px 'Quicksand';cursor:pointer;\">Request a listing<\u002Fbutton>\n            <div style=\"margin-top:13px;font:500 12px 'Quicksand';color:#9aa6a9;text-align:center;\">Free to list. We'll be in touch before launch.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ proDone }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;padding:18px 0;\">\n            <div style=\"width:60px;height:60px;border-radius:50%;background:#FDE7D2;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:28px;\">🌊<\u002Fdiv>\n            <div style=\"font:700 24px 'Fredoka',sans-serif;color:#0D3D47;margin-bottom:8px;\">Thanks, we'll be in touch!<\u002Fdiv>\n            <p style=\"margin:0;font:500 15px/1.6 'Quicksand';color:#5a7077;\">We'll reach out before launch to get your spot set up on Foamies.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOUNDERS ===== -->\n  <section id=\"founders\" style=\"background:#fff;\">\n    <div class=\"fm-founders fm-wrap\" style=\"max-width:1180px;margin:0 auto;padding:80px 40px;display:grid;grid-template-columns:1.15fr .85fr;gap:48px;align-items:center;\">\n      <div>\n        <div style=\"font:700 14px 'Quicksand';color:#E8450A;letter-spacing:.16em;text-transform:uppercase;margin-bottom:14px;\">Meet the founders<\u002Fdiv>\n        <h2 style=\"margin:8px 0 0;font:700 38px 'Fredoka',sans-serif;color:#0D3D47;\">We're Théa &amp; Lorène.<\u002Fh2>\n        <p style=\"margin:20px 0 16px;font:500 18px/1.65 'Quicksand';color:#3c5860;max-width:520px;\">Two surfers who got tired of showing up to a new break not knowing anyone or where to go. So we started building the app we wished existed.<\u002Fp>\n        <p style=\"margin:0 0 22px;font:500 18px/1.65 'Quicksand';color:#3c5860;max-width:520px;\">Foamies is warm and made by hand, built for every surfer. When you join, you're surfing with us from day one.<\u002Fp>\n        <div style=\"font:400 26px 'Gochi Hand',cursive;color:#0D3D47;\">With love, Théa &amp; Lorène<\u002Fdiv>\n        <a href=\"https://instagram.com/foamiesclub\" style=\"display:inline-flex;align-items:center;gap:9px;margin-top:22px;background:#E8450A;color:#fff;border-radius:999px;padding:12px 24px;font:600 15px 'Quicksand';\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"5\"><\u002Frect><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><circle cx=\"17.5\" cy=\"6.5\" r=\"1\" fill=\"#fff\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>Follow our journey @foamiesclub<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"position:relative;height:420px;border-radius:24px;overflow:hidden;\">\n        <img src=\"assets/founders.jpeg\" alt=\"Théa and Lorène, the two surfers who founded Foamies\" style=\"width:100%;height:100%;object-fit:cover;object-position:center 58%;display:block;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== COMMUNITY / INSTAGRAM ===== -->\n  <section id=\"community\" style=\"background:#0D3D47;color:#fff;\">\n    <div class=\"fm-wrap\" style=\"max-width:1180px;margin:0 auto;padding:80px 40px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;margin-bottom:36px;\">\n        <div>\n          <div style=\"font:700 14px 'Quicksand';color:#E8450A;letter-spacing:.16em;text-transform:uppercase;margin-bottom:14px;\">The community<\u002Fdiv>\n          <h2 style=\"margin:0;font:700 40px 'Fredoka',sans-serif;color:#fff;\">More than an app<\u002Fh2>\n          <p style=\"margin:14px 0 0;font:500 18px/1.6 'Quicksand';color:#bfe0e6;max-width:560px;\">On Instagram we spotlight the cafés, surfcamps and surf spots we love, share surf tips, and document our journey building Foamies. Come surf with us before the app even launches.<\u002Fp>\n        <\u002Fdiv>\n        <a href=\"https://instagram.com/foamiesclub\" style=\"background:#E8450A;color:#fff;border-radius:999px;padding:13px 26px;font:600 16px 'Quicksand';white-space:nowrap;\">Follow @foamiesclub<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"fm-ig\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;\">\n        <div style=\"position:relative;aspect-ratio:1;border-radius:16px;background:linear-gradient(150deg,#f3a15f,#E8450A);overflow:hidden;\"><span style=\"position:absolute;left:12px;bottom:10px;font:700 12px 'Quicksand';color:#fff;\">Featured café ☕<\u002Fspan><\u002Fdiv>\n        <div style=\"position:relative;aspect-ratio:1;border-radius:16px;background:linear-gradient(150deg,#A8E6F1,#2f93a6);overflow:hidden;\"><span style=\"position:absolute;left:12px;bottom:10px;font:700 12px 'Quicksand';color:#fff;\">Surf tip 🌊<\u002Fspan><\u002Fdiv>\n        <div style=\"position:relative;aspect-ratio:1;border-radius:16px;background:linear-gradient(150deg,#7faf7a,#cbbf9c);overflow:hidden;\"><span style=\"position:absolute;left:12px;bottom:10px;font:700 12px 'Quicksand';color:#fff;\">Surfcamp spotlight<\u002Fspan><\u002Fdiv>\n        <div style=\"position:relative;aspect-ratio:1;border-radius:16px;background:linear-gradient(150deg,#5aa1d0,#1c6b8a);overflow:hidden;\"><span style=\"position:absolute;left:12px;bottom:10px;font:700 12px 'Quicksand';color:#fff;\">Build update 🛠️<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FAQ ===== -->\n  <section id=\"faq\" style=\"background:#fff;\">\n    <div class=\"fm-wrap\" style=\"max-width:820px;margin:0 auto;padding:80px 40px;\">\n      <div style=\"text-align:center;font:700 14px 'Quicksand';color:#E8450A;letter-spacing:.16em;text-transform:uppercase;margin-bottom:14px;\">Good to know<\u002Fdiv>\n      <h2 style=\"margin:0 0 36px;font:700 40px 'Fredoka',sans-serif;color:#0D3D47;text-align:center;\">Questions, answered<\u002Fh2>\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <div style=\"background:#F4F1EA;border-radius:16px;padding:24px 26px;\"><div style=\"font:700 19px 'Quicksand';color:#0D3D47;margin-bottom:7px;\">When does Foamies launch?<\u002Fdiv><p style=\"margin:0;font:500 16px/1.6 'Quicksand';color:#5a7077;\">Foamies launches in September 2026, with closed testing in August. Join the waiting list to get in first.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#F4F1EA;border-radius:16px;padding:24px 26px;\"><div style=\"font:700 19px 'Quicksand';color:#0D3D47;margin-bottom:7px;\">Is Foamies free?<\u002Fdiv><p style=\"margin:0;font:500 16px/1.6 'Quicksand';color:#5a7077;\">Yes — Foamies is a free app on iOS and Android. Joining the waiting list is free too.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#F4F1EA;border-radius:16px;padding:24px 26px;\"><div style=\"font:700 19px 'Quicksand';color:#0D3D47;margin-bottom:7px;\">Who is Foamies for?<\u002Fdiv><p style=\"margin:0;font:500 16px/1.6 'Quicksand';color:#5a7077;\">Every surfer, from beginner to advanced, locals and travelers. No experience needed.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#F4F1EA;border-radius:16px;padding:24px 26px;\"><div style=\"font:700 19px 'Quicksand';color:#0D3D47;margin-bottom:7px;\">What can I do on the app?<\u002Fdiv><p style=\"margin:0;font:500 16px/1.6 'Quicksand';color:#5a7077;\">Meet surfers near you, log your sessions, explore surf spots, and find local surf pros — surfcamps, shapers, photographers and coaches.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#F4F1EA;border-radius:16px;padding:24px 26px;\"><div style=\"font:700 19px 'Quicksand';color:#0D3D47;margin-bottom:7px;\">How do I get early access?<\u002Fdiv><p style=\"margin:0;font:500 16px/1.6 'Quicksand';color:#5a7077;\">Join the waiting list now. Closed testing spots are limited and go out in August through TestFlight or Google Play.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#F4F1EA;border-radius:16px;padding:24px 26px;\"><div style=\"font:700 19px 'Quicksand';color:#0D3D47;margin-bottom:7px;\">I run a surfcamp / I'm a coach, shaper or photographer — can I get listed?<\u002Fdiv><p style=\"margin:0;font:500 16px/1.6 'Quicksand';color:#5a7077;\">Yes. Request a free listing and be there from day one, in front of every surfer who joins.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#F4F1EA;border-radius:16px;padding:24px 26px;\"><div style=\"font:700 19px 'Quicksand';color:#0D3D47;margin-bottom:7px;\">Where is Foamies available?<\u002Fdiv><p style=\"margin:0;font:500 16px/1.6 'Quicksand';color:#5a7077;\">Worldwide on iOS and Android at launch. We're starting with France, Portugal, Morocco and Spain.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#F4F1EA;border-radius:16px;padding:24px 26px;\"><div style=\"font:700 19px 'Quicksand';color:#0D3D47;margin-bottom:7px;\">Who's behind Foamies?<\u002Fdiv><p style=\"margin:0;font:500 16px/1.6 'Quicksand';color:#5a7077;\">Théa &amp; Lorène — two surfers building Foamies in the open. Follow the journey @foamiesclub.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FINAL CTA ===== -->\n  <section style=\"background:#A8E6F1;\">\n    <div class=\"fm-wrap\" style=\"max-width:1180px;margin:0 auto;padding:72px 40px;text-align:center;\">\n      <div style=\"font:700 14px 'Quicksand';color:#0D3D47;letter-spacing:.16em;text-transform:uppercase;margin-bottom:14px;\">The waiting list is open<\u002Fdiv>\n      <h2 style=\"margin:0 0 12px;font:700 42px 'Fredoka',sans-serif;color:#0D3D47;\">Be first in the water.<\u002Fh2>\n      <p style=\"margin:0 0 28px;font:500 18px 'Quicksand';color:#3c5860;\">Launching September 2026. Join the waiting list and help us build the friendliest surf app around. Closed testing spots are limited — don't miss the first wave.<\u002Fp>\n      <a href=\"https://tally.so/r/ODlBM7\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"display:inline-block;background:#0D3D47;color:#fff;border-radius:999px;padding:15px 34px;font:700 17px 'Quicksand';\">Join the waiting list<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"background:#0D3D47;color:#bfe0e6;\">\n    <div class=\"fm-foot fm-wrap\" style=\"max-width:1180px;margin:0 auto;padding:56px 40px 30px;display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:28px;\">\n      <div>\n        <span style=\"font:700 26px 'Fredoka',sans-serif;color:#fff;\">foamies<\u002Fspan>\n        <p style=\"margin:12px 0 0;font:500 14px/1.6 'Quicksand';max-width:240px;\">A surf community &amp; app in the making, by Théa &amp; Lorène. Launching September 2026.<\u002Fp>\n      <\u002Fdiv>\n      <div><div style=\"font:700 15px 'Quicksand';color:#fff;margin-bottom:14px;\">The app<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:9px;font:500 14px 'Quicksand';\"><a href=\"#features\">Find surf buddies<\u002Fa><a href=\"#features\">Log &amp; share<\u002Fa><a href=\"#features\">Explore surf spots<\u002Fa><a href=\"#features\">Find surf pros<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font:700 15px 'Quicksand';color:#fff;margin-bottom:14px;\">Foamies<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:9px;font:500 14px 'Quicksand';\"><a href=\"https://tally.so/r/ODlBM7\" target=\"_blank\" rel=\"noopener noreferrer\">Join the waiting list<\u002Fa><a href=\"#pros\">For surf pros<\u002Fa><a href=\"#founders\">Team<\u002Fa><a href=\"https://instagram.com/foamiesclub\">Instagram<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font:700 15px 'Quicksand';color:#fff;margin-bottom:14px;\">Legal &amp; contact<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:9px;font:500 14px 'Quicksand';\"><a href=\"Privacy.dc.html\">Privacy policy<\u002Fa><a href=\"Terms.dc.html\">Terms of use<\u002Fa><a href=\"mailto:foamiesclub@gmail.com\">foamiesclub@gmail.com<\u002Fa><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"fm-padx\" style=\"max-width:1180px;margin:0 auto;padding:18px 40px 40px;border-top:1px solid rgba(255,255,255,.12);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font:500 13px 'Quicksand';color:#8fb3bb;\">\n      <span>© 2026 Foamies · foamiesclub.com<\u002Fspan>\n      <span>Made by two surfers 🤙<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { platform: 'ios', betaDone: false, proDone: false };\n  renderVals() {\n    const s = this.state;\n    const seg = (active) => 'flex:1;text-align:center;cursor:pointer;border-radius:12px;padding:12px 8px;font:700 14px Quicksand,sans-serif;transition:all .15s;' +\n      (active ? 'background:#0D3D47;color:#fff;border:1.5px solid #0D3D47;' : 'background:#fff;color:#0D3D47;border:1.5px solid #d9dedc;');\n    return {\n      iosStyle: seg(s.platform === 'ios'),\n      androidStyle: seg(s.platform === 'android'),\n      setIos: () => this.setState({ platform: 'ios' }),\n      setAndroid: () => this.setState({ platform: 'android' }),\n      betaDone: s.betaDone,\n      betaOpen: !s.betaDone,\n      submitBeta: (e) => { if (e && e.preventDefault) e.preventDefault(); this.setState({ betaDone: true }); },\n      proDone: s.proDone,\n      proOpen: !s.proDone,\n      submitPro: (e) => { if (e && e.preventDefault) e.preventDefault(); this.setState({ proDone: true }); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
